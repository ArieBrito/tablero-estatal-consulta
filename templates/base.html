<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}{% endblock %}</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="{% block body_class %}{% endblock %}"
      data-login-error="{{ 'true' if error else 'false' }}">

<!-- ================= HEADER ================= -->

<header class="main-header">

    <div class="container header-content">

        <div class="logo-wrapper">
            <a href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='assets/logo/logo.png') }}"
                     alt="Logo"
                     class="logo">
            </a>
        </div>

        <div class="header-actions">

            {% if usuario %}

                <span class="inst-label">
                    {{ institucion }}
                </span>

                <a href="{{ url_for('logout') }}" class="btn btn-secondary">
                    Cerrar sesión
                </a>

            {% else %}

                <button class="btn btn-primary" id="openLogin">
                    Iniciar sesión
                </button>

            {% endif %}

        </div>

    </div>

</header>


<!-- ================= CONTENIDO ================= -->

{% block content %}{% endblock %}


<!-- ================= FOOTER ================= -->

<footer class="site-footer">
    <div class="container">
        © {{ 2025 }} Tablero de Implementación · Política Estatal Anticorrupción
    </div>
</footer>

</body>
</html>
